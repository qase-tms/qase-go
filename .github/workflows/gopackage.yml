name: Go build

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        go-version: ["1.18", "1.19", "1.20", "1.21", "1.22"]
        changed-dir: ["qase-api-client", "qase-api-v2-client", "pkg/qase-go"]
    name: Project ${{ matrix.changed-dir }} - Go ${{ matrix.go-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: "shell"
          filters: |
            changes:
              - '${{ matrix.changed-dir }}/**'

      - name: Set up Go ${{ matrix.go-version }}
        if: steps.filter.outputs.changes == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        if: steps.filter.outputs.changes == 'true'
        run: go mod tidy
        working-directory: ./${{ matrix.changed-dir }}

      - name: Build
        if: steps.filter.outputs.changes == 'true'
        working-directory: ./${{ matrix.changed-dir }}
        run: go build -v ./...

      - name: Test
        if: steps.filter.outputs.changes == 'true'
        working-directory: ./${{ matrix.changed-dir }}
        run: go test -v -cover ./...

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    name: Integration test - Go reporter
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reporters-validator
        run: pip install git+https://github.com/qase-tms/reporters-validator.git

      - name: Download report schemas
        run: git clone --depth 1 https://github.com/qase-tms/specs.git /tmp/specs

      - name: Install dependencies
        run: go mod tidy
        working-directory: ./examples/go

      - name: Run suite01 examples
        working-directory: ./examples/go
        run: |
          QASE_MODE=report \
          QASE_REPORT_CONNECTION_PATH=${{ github.workspace }}/build/report \
          go test ./suite01/... -v -count=1 || true

      - name: Run suite02 examples
        working-directory: ./examples/go
        run: |
          QASE_MODE=report \
          QASE_REPORT_CONNECTION_PATH=${{ github.workspace }}/build/report \
          go test ./suite02/... -v -count=1 || true

      - name: Validate Go reporter
        run: |
          reporters-validator validate \
            --report-dir ${{ github.workspace }}/build/report \
            --expected expected/go-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

  release:
    runs-on: ubuntu-latest
    if: contains(github.ref, '/v') && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
