name: Go build

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        go-version: ["1.18", "1.19", "1.20", "1.21", "1.22"]
        changed-dir: ["qase-api-client", "qase-api-v2-client", "pkg/qase-go"]
    name: Project ${{ matrix.changed-dir }} - Go ${{ matrix.go-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: "shell"
          filters: |
            changes:
              - '${{ matrix.changed-dir }}/**'

      - name: Set up Go ${{ matrix.go-version }}
        if: steps.filter.outputs.changes == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        if: steps.filter.outputs.changes == 'true'
        run: go mod tidy
        working-directory: ./${{ matrix.changed-dir }}

      - name: Build
        if: steps.filter.outputs.changes == 'true'
        working-directory: ./${{ matrix.changed-dir }}
        run: go build -v ./...

      - name: Test
        if: steps.filter.outputs.changes == 'true'
        working-directory: ./${{ matrix.changed-dir }}
        run: go test -v -cover ./...

  release:
    runs-on: ubuntu-latest
    if: contains(github.ref, '/v') && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
